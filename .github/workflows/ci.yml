name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instala dependências
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Formatação (ruff format)
        run: ruff format --check .

      - name: Tipos (mypy)
        run: mypy

      - name: Testes (pytest)
        run: pytest
